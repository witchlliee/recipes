name        : noctalia
version     : "5.0.0+git.298fad1"
release     : 1
homepage    : https://noctalia.dev/
upstreams   :
    - git|https://github.com/noctalia-dev/noctalia-shell.git: 298fad1678d23c964aa8ea56bfe9dc3c84eed6a4
summary     : a lightweight Wayland shell implementation in C++ and OpenGL ES
description : |
  A lightweight Wayland shell and bar built directly on Wayland + OpenGL ES, with no Qt or GTK dependency.
license     :
    - MIT
builddeps   :
    - pkgconfig(cairo)
    - pkgconfig(epoxy)
    - pkgconfig(fontconfig)
    - pkgconfig(freetype2)
    - pkgconfig(glib-2.0)
    - pkgconfig(jemalloc)
    - pkgconfig(libcurl)
    - pkgconfig(libcurl)
    - pkgconfig(libglvnd)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libqalculate)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libwebp)
    - pkgconfig(libxml-2.0)
    - pkgconfig(pam)
    - pkgconfig(pango)
    - pkgconfig(polkit-agent-1)
    - pkgconfig(sdbus-c++)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xkbcommon)
rundeps     :
    - jemalloc
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install

    %install_file LICENSE -t %(installroot)%(datadir)/licenses/noctalia/
    %install_file README.md -t %(installroot)%(datadir)/doc/noctalia/
