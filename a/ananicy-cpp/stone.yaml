name        : ananicy-cpp
version     : "1.2.0"
release     : 1
homepage    : https://gitlab.com/ananicy-cpp/ananicy-cpp
upstreams   :
    - https://gitlab.com/ananicy-cpp/ananicy-cpp/-/archive/v1.2.0/ananicy-cpp-v1.2.0.tar.gz?ref_type=tags : d75157b9588748ce6ae04c3e2d71625d8eec6bf2d23e06f8cb6f9687c74813f7
summary     : Ananicy Cpp is a full rewrite of Ananicy in C++, featuring lower CPU and RAM usage
description : |
    Ananicy Cpp is a full rewrite of Ananicy in C++, featuring lower CPU and RAM usage.
license     :
    - GPL-3.0-or-later
builddeps   :
    - binary(bpftool)
    - binary(fmt)
    - pkgconfig(libbpf)
    - pkgconfig(libpcre2-8)
    - pkgconfig(libsystemd)
    - pkgconfig(nlohmann_json)
    - pkgconfig(spdlog)
rundeps     :
    - cachyos-ananicy-rules
tuning      :
    - lto: false
setup       : |
    %patch %(pkgdir)/stateless.patch
    %patch %(pkgdir)/building.patch

    %cmake \
        -DUSE_EXTERNAL_SPDLOG=ON \
        -DUSE_EXTERNAL_JSON=ON \
        -DUSE_EXTERNAL_FMTLIB=ON \
        -DENABLE_SYSTEMD=ON \
        -DUSE_BPF_PROC_IMPL=ON \
        -DBPF_BUILD_LIBBPF=OFF \
        -DENABLE_REGEX_SUPPORT=ON \
        -DVERSION=%(version)
build       : |
    %cmake_build --target ananicy-cpp
install     : |
    %cmake_install --component Runtime
